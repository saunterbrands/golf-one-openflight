<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Golf One is starting</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, "Arial Black", Arial, sans-serif;
        background: #173a30;
        color: #f3f3f3;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #173a30;
      }

      body {
        display: grid;
        place-items: center;
      }

      main {
        display: grid;
        justify-items: center;
        gap: 38px;
        width: min(76vw, 1120px);
      }

      img {
        display: block;
        width: min(62vw, 900px);
        height: auto;
      }

      .status {
        display: flex;
        align-items: center;
        gap: 18px;
        font-size: 22px;
        font-weight: 900;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .pulse {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #92d547;
        box-shadow: 0 0 0 0 rgb(146 213 71 / 55%);
        animation: pulse 1.5s ease-out infinite;
      }

      @keyframes pulse {
        70% {
          box-shadow: 0 0 0 18px rgb(146 213 71 / 0%);
        }
        100% {
          box-shadow: 0 0 0 0 rgb(146 213 71 / 0%);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .pulse {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <main aria-label="Golf One is starting">
      <img src="../../ui/public/golfone-logo.svg" alt="Golf One" />
      <div class="status" role="status">
        <span class="pulse" aria-hidden="true"></span>
        <span>Starting launch monitor</span>
      </div>
    </main>
    <script>
      const readinessUrl = 'http://127.0.0.1:38917/ready';
      const dashboardUrl = window.location.hash
        ? decodeURIComponent(window.location.hash.slice(1))
        : 'http://localhost:8080/';

      async function openDashboardWhenReady() {
        try {
          await fetch(dashboardUrl, { cache: 'no-store', mode: 'no-cors' });
          window.location.replace(dashboardUrl);
        } catch {
          window.setTimeout(openDashboardWhenReady, 500);
        }
      }

      async function reportFirstPaint() {
        try {
          await fetch(`${readinessUrl}?t=${Date.now()}`, {
            cache: 'no-store',
            mode: 'no-cors',
          });
          window.setTimeout(openDashboardWhenReady, 250);
        } catch {
          window.setTimeout(reportFirstPaint, 100);
        }
      }

      window.addEventListener('load', () => {
        window.requestAnimationFrame(() => {
          window.requestAnimationFrame(reportFirstPaint);
        });
      });
    </script>
  </body>
</html>
